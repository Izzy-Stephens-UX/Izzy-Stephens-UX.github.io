const out = document.getElementById('output');
let typingLocked = false;
const typeQueue = [];

function addLine(cls, text) {
  const el = document.createElement('div');
  el.className = cls;
  el.textContent = text;
  out.appendChild(el);
  scrollBottom();
}

let _scrollPending = false;
function scrollBottom() {
  if (_scrollPending) return;
  _scrollPending = true;
  requestAnimationFrame(() => { out.scrollTop = out.scrollHeight; _scrollPending = false; });
}

function enqueueTyped(text, cls = 't-desc', delay = 0) {
  typeQueue.push({ text, cls, delay });
  if (!typingLocked) drainQueue();
}

function drainQueue() {
  if (typeQueue.length === 0) { typingLocked = false; return; }
  typingLocked = true;
  const { text, cls, delay } = typeQueue.shift();
  setTimeout(() => typeText(text, cls, drainQueue), delay);
}

function typeText(text, cls, onDone) {
  const el = document.createElement('div');
  el.className = cls;
  el.style.marginBottom = '2px';
  out.appendChild(el);
  const chars = [...text];
  let i = 0;
  function tick() {
    if (i >= chars.length) {
      scrollBottom();
      if (onDone) onDone();
      return;
    }
    el.textContent += chars[i];
    i++;
    scrollBottom();
    const ch = chars[i - 1];
    let delay = 12;
    if (ch === '\n') delay = 70;
    else if (ch === '.' || ch === '!' || ch === '?') delay = 55;
    else if (ch === ',') delay = 28;
    else delay = 9 + Math.random() * 7;
    setTimeout(tick, delay);
  }
  tick();
}

function spacer() { addLine('t-spacer', ''); }
function rule(char = '────────────────────────────────────────') { addLine('t-rule', char); }

// Render help as a structured HTML block (instant, not typed)
function showHelp() {
  const block = document.createElement('div');
  block.className = 'help-block';
  block.innerHTML = `
    <div class="h-title">COMMANDS</div>
    <div class="h-rule">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>

    <div class="h-section">MOVEMENT</div>
    <div class="h-row"><span class="h-cmd">go [place]</span><span class="h-desc">move somewhere</span></div>
    <div class="h-row"><span class="h-cmd">north / south / east / west</span><span class="h-desc">bare directions also work</span></div>

    <div class="h-section">LOOKING</div>
    <div class="h-row"><span class="h-cmd">look / l</span><span class="h-desc">describe where you are</span></div>
    <div class="h-row"><span class="h-cmd">examine [thing] / x</span><span class="h-desc">inspect something closely</span></div>
    <div class="h-row"><span class="h-cmd">read [thing]</span><span class="h-desc">same as examine</span></div>

    <div class="h-section">INTERACTING</div>
    <div class="h-row"><span class="h-cmd">take [item]</span><span class="h-desc">pick something up</span></div>
    <div class="h-row"><span class="h-cmd">use [item]</span><span class="h-desc">use an item</span></div>
    <div class="h-row"><span class="h-cmd">talk [person]</span><span class="h-desc">speak to someone</span></div>
    <div class="h-row"><span class="h-cmd">photograph</span><span class="h-desc">photograph evidence</span></div>

    <div class="h-section">UTILITY</div>
    <div class="h-row"><span class="h-cmd">inventory / i</span><span class="h-desc">what you're carrying</span></div>
    <div class="h-row"><span class="h-cmd">help / ?</span><span class="h-desc">this menu</span></div>
    <div class="h-row"><span class="h-cmd">restart</span><span class="h-desc">start over</span></div>
  `;
  out.appendChild(block);
  scrollBottom();
}

function describeRoom(id) {
  const room = WORLD[id];
  spacer();
  addLine('t-title', room.name);
  rule();
  const firstVisit = !G.visited.has(id);
  G.visited.add(id);
  let text;
  if (firstVisit && room.firstLook) {
    text = resolve(room.firstLook);
  } else if (room.shortLook) {
    text = resolve(room.shortLook);
  } else {
    text = resolve(room.firstLook);
  }
  enqueueTyped(text, 't-desc');
}

function showEnding(id) {
  const room = WORLD[id];
  spacer();
  addLine('t-title', room.name);
  rule('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  setTimeout(() => enqueueTyped(room.endingText, room.endingClass || 't-desc'), 600);
}

function parse(raw) {
  const input = raw.trim();
  if (!input) return;
  addLine('t-input', '> ' + input);

  const room = WORLD[G.room];
  if (room && room.isEnding) {
    if (input.toLowerCase() === 'restart') { resetGame(); return; }
    enqueueTyped(`The story is over.\nType RESTART to begin again.`, 't-system');
    return;
  }

  const cmd = input.toLowerCase().replace(/[^a-z0-9\s']/g, '').trim();
  const words = cmd.split(/\s+/);
  const verb = words[0];
  const rest = words.slice(1).join(' ');

  if (cmd === 'restart') { resetGame(); return; }

  if (cmd === 'help' || cmd === '?') { showHelp(); return; }

  if (cmd === 'look' || cmd === 'l' || cmd === 'look around') { describeRoom(G.room); return; }

  if (cmd === 'inventory' || cmd === 'i' || cmd === 'items' || cmd === 'bag') {
    enqueueTyped(
      G.inventory.length === 0
        ? `You're carrying nothing of note.`
        : `You're carrying:\n  ${G.inventory.join('\n  ')}`,
      't-system'
    );
    return;
  }

  if (verb === 'photograph' || verb === 'photo' || verb === 'snap') {
    if (G.room === 'surveillance' && G.flags.readProtocol) enqueueTyped(photographEvidence(), 't-desc');
    else enqueueTyped(`There's nothing here you need to photograph yet.`, 't-desc');
    return;
  }

  if (verb === 'read' || verb === 'open') { doExamine(rest); return; }

  if (verb === 'examine' || verb === 'x' || (verb === 'look' && words[1] === 'at')) {
    const target = verb === 'look' ? words.slice(2).join(' ') : rest;
    doExamine(target);
    return;
  }

  if (verb === 'take' || verb === 'get' || (verb === 'pick' && words[1] === 'up')) {
    const target = verb === 'pick' ? words.slice(2).join(' ') : rest;
    doTake(target);
    return;
  }

  if (verb === 'use' || verb === 'swipe' || verb === 'press' || verb === 'apply') {
    doUse(rest);
    return;
  }

  if (verb === 'talk' || verb === 'speak' || verb === 'ask' || verb === 'greet') {
    const target = rest.replace(/^(to|with)\s+/, '');
    doTalk(target);
    return;
  }

  if (verb === 'go' || verb === 'move' || verb === 'walk' || verb === 'head' || verb === 'enter') {
    const target = rest.replace(/^(to|the|into|through|down|up)\s+/, '');
    doGo(target);
    return;
  }

  const bareExits = ['north','south','east','west','up','down'];
  if (bareExits.includes(cmd)) { doGo(cmd); return; }
  if (WORLD[G.room]?.exits?.[cmd]) { doGo(cmd); return; }

  const examined = tryExamine(cmd);
  if (examined) { handleExamineResult(examined); return; }

  enqueueTyped(`Not sure what you mean. Try LOOK, GO [place], EXAMINE [thing], or HELP.`, 't-system');
}

function doExamine(target) {
  if (!target) { describeRoom(G.room); return; }
  const result = tryExamine(target);
  if (result !== null) handleExamineResult(result);
  else enqueueTyped(`You look at the ${target}, and nothing more reveals itself.`, 't-desc');
}

function tryExamine(target) {
  const room = WORLD[G.room];
  if (!room || !room.examine) return null;
  const ex = room.examine;
  if (ex[target] !== undefined) {
    return resolve(ex[target]);
  }
  for (const key of Object.keys(ex)) {
    if (target.includes(key) || key.includes(target)) {
      return resolve(ex[key]);
    }
  }
  return null;
}

function handleExamineResult(result) {
  if (result === '__TRIGGER_DARK__') { triggerDark(); return; }
  enqueueTyped(result, 't-desc');
}

function doTake(target) {
  const room = WORLD[G.room];
  if (!room || !room.take) { enqueueTyped(`You can't take that.`, 't-desc'); return; }
  const tk = room.take;
  let result = null;
  if (tk[target] !== undefined) {
    result = resolve(tk[target]);
  } else {
    for (const key of Object.keys(tk)) {
      if (target.includes(key) || key.includes(target)) {
        result = resolve(tk[key]);
        break;
      }
    }
  }
  if (result !== null) enqueueTyped(result, 't-desc');
  else enqueueTyped(`You can't take that.`, 't-desc');
}

function doUse(target) {
  const stripped = target.replace(/\s+on\s+.*$/, '').trim();
  if ((stripped.includes('keycard') || stripped.includes('card')) && G.room === 'cabinet') {
    if (!G.flags.tookKeycard) { enqueueTyped(`You don't have a keycard.`, 't-desc'); return; }
    enterSurveillance();
    return;
  }
  const room = WORLD[G.room];
  const us = room?.use || {};
  let result = null;
  for (const key of [target, stripped]) {
    if (us[key] !== undefined) {
      result = resolve(us[key]);
      break;
    }
  }
  if (result === null) {
    for (const key of Object.keys(us)) {
      if (target.includes(key) || key.includes(target)) {
        result = resolve(us[key]);
        break;
      }
    }
  }
  if (result === '__ENTER_SURVEILLANCE__') { enterSurveillance(); return; }
  if (result !== null) enqueueTyped(result, 't-desc');
  else enqueueTyped(`That doesn't seem to do anything.`, 't-desc');
}

function doTalk(target) {
  const room = WORLD[G.room];
  const tk = room?.talk || {};
  let result = null;
  if (tk[target] !== undefined) {
    result = resolve(tk[target]);
  } else {
    for (const key of Object.keys(tk)) {
      if (target.includes(key) || key.includes(target)) {
        result = resolve(tk[key]);
        break;
      }
    }
  }
  if (result !== null) enqueueTyped(result, 't-desc');
  else enqueueTyped(`There's no one by that name here, or they don't want to talk.`, 't-desc');
}

function doGo(target) {
  const alignmentWords = ['alignment', 'hale', 'session', 'consultant'];
  if (alignmentWords.some(w => target.includes(w))) { goToEnding('ending_boring'); return; }

  const exitWords = ['exit', 'stairs', 'stair', 'leave', 'outside', 'out', 'down', 'elevator'];
  if (G.room === 'surveillance' && exitWords.some(w => target.includes(w))) {
    if (G.flags.photographed) { goToEnding('ending_good'); }
    else if (G.flags.readProtocol) { enqueueTyped(`You need to take the evidence first. Photograph it.`, 't-desc'); }
    else { doGo('back'); }
    return;
  }

  const room = WORLD[G.room];
  const exits = room?.exits || {};
  let dest = null;
  if (exits[target] !== undefined) {
    dest = resolve(exits[target]);
  }
  if (!dest) {
    for (const key of Object.keys(exits)) {
      if (target.includes(key) || key.includes(target)) {
        dest = resolve(exits[key]);
        break;
      }
    }
  }
  if (!dest) { enqueueTyped(`You can't go that way.`, 't-desc'); return; }
  if (dest === '_boring') { goToEnding('ending_boring'); return; }
  if (!WORLD[dest]) { enqueueTyped(`You can't go that way.`, 't-desc'); return; }

  G.room = dest;
  describeRoom(dest);
}

function enterSurveillance() {
  G.flags.foundDoor = true;
  enqueueTyped(`You press the keycard against the panel, and after a soft click and a pressurized hiss, the wall opens.`, 't-desc');
  setTimeout(() => {
    G.room = 'surveillance';
    G.flags.enteredSurveillance = true;
    describeRoom('surveillance');
  }, 2400);
}

function triggerDark() {
  enqueueTyped(`You stare into the monitors, and on monitor twelve, the corridor outside this room, there's a figure moving toward the door.\n\nYou turn around.`, 't-desc');
  setTimeout(() => goToEnding('ending_dark'), 5200);
}

function goToEnding(id) {
  G.room = id;
  showEnding(id);
}

function resetGame() {
  G = freshState();
  out.innerHTML = '';
  startGame();
}

function startGame() {
  addLine('t-title', 'M E R I D I A N');
  rule('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  enqueueTyped(`A text adventure with three endings.\n\nYou are Alex, and it's your first day. Something is already wrong.\n\nType HELP for commands.`, 't-system', 0);
  setTimeout(() => describeRoom('lobby'), 2800);
}

const cmdInput = document.getElementById('cmd');

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = cmdInput.value;
    cmdInput.value = '';
    parse(val);
  }
});

document.addEventListener('click', () => cmdInput.focus());
document.addEventListener('keydown', () => cmdInput.focus());

startGame();</script>
